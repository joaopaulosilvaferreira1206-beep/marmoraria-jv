name: Build & Release

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────
  # WINDOWS — instalador .exe via Electron + NSIS
  # ─────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar icon.ico com tamanhos corretos
        run: |
          node -e "
          const { Jimp } = require('jimp')
          const { default: pngToIco } = require('png-to-ico')
          const fs = require('fs')
          ;(async () => {
            const img = await Jimp.read('public/icon-512.png')
            const sizes = [16,32,48,64,128,256]
            const buffers = await Promise.all(sizes.map(s => img.clone().resize({w:s,h:s}).getBuffer('image/png')))
            const ico = await pngToIco(buffers)
            fs.writeFileSync('icon.ico', ico)
            fs.writeFileSync('public/icon.ico', ico)
            console.log('icon.ico gerado:', ico.length, 'bytes')
          })().catch(e => { console.error(e); process.exit(1) })
          "

      - name: Build web + instalador Windows
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm run build
          npm run build:desktop

      - name: Gerar latest.yml para auto-update
        run: node scripts/generate-latest-yml.cjs

      - name: Upload instalador + latest.yml
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
            release/latest.yml

  # ─────────────────────────────────────────────────
  # ANDROID — APK via Capacitor + Gradle
  # ─────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependências
        run: npm ci

      - name: Build web assets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sincronizar web assets e plugins Capacitor para o Android
        run: npx cap sync android

      - name: Configurar Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Criar capacitor-cordova-android-plugins
        run: |
          mkdir -p android/capacitor-cordova-android-plugins/src/main/libs
          {
            echo '// DO NOT EDIT THIS FILE! IT IS GENERATED EACH TIME "capacitor update" IS RUN'
            echo 'ext {'
            echo '}'
          } > android/capacitor-cordova-android-plugins/cordova.variables.gradle
          {
            echo '// DO NOT EDIT THIS FILE! IT IS GENERATED EACH TIME "capacitor update" IS RUN'
            echo "apply plugin: 'com.android.library'"
            echo 'android {'
            echo '    namespace "com.capacitorjs.cordova.plugins"'
            echo '    compileSdkVersion rootProject.ext.compileSdkVersion'
            echo '    defaultConfig {'
            echo '        minSdkVersion rootProject.ext.minSdkVersion'
            echo '        targetSdkVersion rootProject.ext.targetSdkVersion'
            echo '    }'
            echo '}'
            echo 'dependencies {'
            echo '    implementation project(":capacitor-android")'
            echo '}'
          } > android/capacitor-cordova-android-plugins/build.gradle

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Preparar APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p apk-out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "apk-out/MarmorariaJV-v${VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: apk-out/*.apk

  # ─────────────────────────────────────────────────
  # RELEASE — só roda após AMBOS os builds terminarem
  # ─────────────────────────────────────────────────
  release:
    needs: [windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Baixar artefatos dos dois jobs
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Remover release/tag 'latest' anterior
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true

      - name: Publicar release com instaladores e latest.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create latest \
            --title "Marmoraria JV v${VERSION} — Download" \
            --notes $'## Instaladores\n\n**Windows** → baixe o `.exe` e execute para instalar\n\n**Android** → baixe o `.apk`, transfira para o celular, ative *Fontes desconhecidas* e instale\n\n---\nAtualizado automaticamente a cada alteração.' \
            --latest \
            artifacts/windows/*.exe \
            artifacts/windows/latest.yml \
            artifacts/android/*.apk
