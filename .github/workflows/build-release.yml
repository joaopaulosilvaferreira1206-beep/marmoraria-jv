name: Build & Release

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────
  # WINDOWS — instalador .exe via Electron + NSIS
  # ─────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build web + instalador Windows
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm run build
          npm run build:desktop

      - name: Upload instalador
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*.exe

  # ─────────────────────────────────────────────────
  # ANDROID — APK via Capacitor + Gradle
  # ─────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependências
        run: npm ci

      - name: Build web assets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sincronizar Capacitor → Android
        run: npx cap sync android

      - name: Configurar SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Permissão de execução no Gradle
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Preparar APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p apk-out
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             "apk-out/MarmorariaJV-v${VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: apk-out/*.apk

  # ─────────────────────────────────────────────────
  # RELEASE — só roda após AMBOS os builds terminarem
  # ─────────────────────────────────────────────────
  release:
    needs: [windows, android]   # espera os dois builds completos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Baixar artefatos dos dois jobs
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Remover release/tag 'latest' anterior
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true

      - name: Publicar release com os dois instaladores
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create latest \
            --title "Marmoraria JV v${VERSION} — Download" \
            --notes $'## Instaladores\n\n**Windows** → baixe o `.exe` e execute para instalar\n\n**Android** → baixe o `.apk`, transfira para o celular, ative *Fontes desconhecidas* e instale\n\n---\nAtualizado automaticamente a cada alteração.' \
            --latest \
            artifacts/windows/*.exe \
            artifacts/android/*.apk
