name: Build & Release

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────
  # WINDOWS — instalador .exe via Electron + NSIS
  # ─────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build web + instalador Windows
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm run build
          npm run build:desktop

      - name: Upload instalador
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*.exe

  # ─────────────────────────────────────────────────
  # ANDROID — APK via Capacitor + Gradle
  # ─────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependências
        run: npm ci

      - name: Build web assets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sincronizar Capacitor → Android
        run: npx cap sync android

      - name: Configurar SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Permissão de execução no Gradle
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Preparar APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p apk-out
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             "apk-out/MarmorariaJV-v${VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: apk-out/*.apk

  # ─────────────────────────────────────────────────
  # RELEASE — publica/atualiza o release "latest" no GitHub
  # ─────────────────────────────────────────────────
  release:
    needs: [windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Baixar artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Marmoraria JV — Download"
          make_latest: true
          body: |
            ## Instaladores mais recentes

            | Plataforma | Como instalar |
            |:---|:---|
            | **Windows** → baixe o `.exe` | Execute e siga o instalador |
            | **Android** → baixe o `.apk` | Transfira pro celular, ative *Fontes desconhecidas* e abra o arquivo |

            > Atualizado automaticamente a cada alteração no sistema.
          files: |
            artifacts/windows/*.exe
            artifacts/android/*.apk
