name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get commit SHA
        id: sha
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Create Vercel deployment
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=team_P21Vcp7qK3KPGfKoDyXELA9n" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "marmoraria-jv",
              "target": "production",
              "gitSource": {
                "type": "github",
                "repoId": "1227612852",
                "ref": "main",
                "sha": "${{ github.sha }}"
              }
            }' | tee /tmp/deploy.json
          STATE=$(cat /tmp/deploy.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','?'))")
          echo "Deploy state: $STATE"
