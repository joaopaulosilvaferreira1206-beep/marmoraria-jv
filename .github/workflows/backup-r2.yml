name: Backup → Cloudflare R2

on:
  schedule:
    - cron: '0 6 * * *'   # 03:00 BRT (06:00 UTC) todos os dias
  workflow_dispatch:        # disparo manual pelo GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar AWS SDK
        run: npm install @aws-sdk/client-s3

      - name: Exportar, fazer upload e limpar backups antigos
        env:
          SUPABASE_URL:         ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET:            ${{ secrets.R2_BUCKET }}
        run: |
          node - <<'EOF'
          const https  = require('https')
          const fs     = require('fs')
          const { S3Client, PutObjectCommand, ListObjectsV2Command, DeleteObjectCommand } = require('@aws-sdk/client-s3')

          const TABELAS = [
            'fornecedores','clientes','materiais',
            'vendas','itens_venda','orcamentos','itens_orcamento',
            'pedidos','entradas','perdas'
          ]

          function buscar(tabela) {
            return new Promise((resolve, reject) => {
              const url  = new URL(`/rest/v1/${tabela}?select=*`, process.env.SUPABASE_URL)
              const opts = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                headers: {
                  apikey: process.env.SUPABASE_SERVICE_KEY.trim(),
                  Authorization: `Bearer ${process.env.SUPABASE_SERVICE_KEY.trim()}`,
                  'Range-Unit': 'items',
                  Range: '0-9999',
                },
              }
              https.get(opts, res => {
                let body = ''
                res.on('data', d => body += d)
                res.on('end', () => resolve(JSON.parse(body)))
              }).on('error', reject)
            })
          }

          ;(async () => {
            // 1. Coletar dados
            const dados = { _gerado_em: new Date().toISOString() }
            for (const t of TABELAS) {
              dados[t] = await buscar(t)
              console.log(`  ${t}: ${dados[t].length} registros`)
            }

            // 2. Nome do arquivo
            const ts       = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19) + 'Z'
            const filename = `backup_${ts}.json`
            const key      = `marmoraria-jv/${filename}`

            // 3. Upload para R2
            const s3 = new S3Client({
              region: 'auto',
              endpoint: `https://${process.env.R2_ACCOUNT_ID.trim()}.r2.cloudflarestorage.com`,
              credentials: {
                accessKeyId:     process.env.R2_ACCESS_KEY_ID.trim(),
                secretAccessKey: process.env.R2_SECRET_ACCESS_KEY.trim(),
              },
            })

            await s3.send(new PutObjectCommand({
              Bucket: process.env.R2_BUCKET.trim(),
              Key:    key,
              Body:   JSON.stringify(dados),
              ContentType: 'application/json',
            }))
            console.log('✅ Upload concluído:', key)

            // 4. Manter só os 30 mais recentes
            const lista = await s3.send(new ListObjectsV2Command({
              Bucket: process.env.R2_BUCKET.trim(),
              Prefix: 'marmoraria-jv/',
            }))
            const objetos = (lista.Contents || []).sort((a, b) => a.Key.localeCompare(b.Key))
            const excluir = objetos.slice(0, Math.max(0, objetos.length - 30))
            for (const obj of excluir) {
              await s3.send(new DeleteObjectCommand({ Bucket: process.env.R2_BUCKET.trim(), Key: obj.Key }))
              console.log('Removido:', obj.Key)
            }
            console.log(`Backups mantidos: ${objetos.length - excluir.length}`)
          })()
          EOF
        shell: bash
